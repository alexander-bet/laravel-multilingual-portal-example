<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <!-- Globe icon (icon-only, no text) -->
  <circle cx="36" cy="36" r="28" fill="none" stroke="#1e365a" stroke-width="2.5"/>
  <!-- Equator -->
  <line x1="8" y1="36" x2="64" y2="36" stroke="#1e365a" stroke-width="2"/>
  <!-- Upper latitude -->
  <path d="M15 20 Q36 16 57 20" fill="none" stroke="#1e365a" stroke-width="2"/>
  <!-- Lower latitude -->
  <path d="M15 52 Q36 56 57 52" fill="none" stroke="#1e365a" stroke-width="2"/>
  <!-- Central meridian -->
  <ellipse cx="36" cy="36" rx="14" ry="28" fill="none" stroke="#1e365a" stroke-width="2"/>
  <!-- Orange accent dot -->
  <circle cx="50" cy="18" r="7" fill="#ef6f2e"/>
</svg>
