services:
  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: chinaglobalhub_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./storage/logs/nginx:/var/log/nginx
    depends_on:
      - laravel
    networks:
      - chinaglobalhub
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Laravel PHP-FPM
  laravel:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: chinaglobalhub_laravel_prod
    restart: always
    working_dir: /app
    volumes:
      - .:/app
      - ./storage/logs:/app/storage/logs
    depends_on:
      - postgres
      - redis
    networks:
      - chinaglobalhub
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://chinaglobalhub.com
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=chinaglobalhub
      - DB_USERNAME=chinaglobalhub
      - DB_PASSWORD=${DB_PASSWORD}
      - CACHE_DRIVER=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - SCOUT_DRIVER=meilisearch
      - MEILISEARCH_HOST=http://meilisearch:7700
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_BUCKET=chinaglobalhub
      - AWS_ENDPOINT=https://xxx.r2.cloudflarestorage.com
      - AWS_USE_PATH_STYLE_ENDPOINT=false
      - MAIL_MAILER=resend
      - RESEND_API_KEY=${RESEND_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TZ=UTC
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:pg16-latest
    container_name: chinaglobalhub_postgres_prod
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/backup:/backup
    environment:
      - POSTGRES_DB=chinaglobalhub
      - POSTGRES_USER=chinaglobalhub
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - TZ=UTC
    networks:
      - chinaglobalhub
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chinaglobalhub"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: chinaglobalhub_redis_prod
    restart: always
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    networks:
      - chinaglobalhub
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Meilisearch
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: chinaglobalhub_meilisearch_prod
    restart: always
    volumes:
      - meilisearch_data:/meili_data
    environment:
      - MEILI_ENV=production
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILISEARCH_KEY}
      - TZ=UTC
    networks:
      - chinaglobalhub
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  meilisearch_data:
    driver: local

networks:
  chinaglobalhub:
    driver: bridge
