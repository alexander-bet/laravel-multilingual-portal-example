services:
  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: chinaglobalhub_nginx
    ports:
      - "80:80"
    volumes:
      - ./backend:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/storage/logs/nginx:/var/log/nginx
    depends_on:
      - laravel
    networks:
      - chinaglobalhub
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel PHP-FPM
  laravel:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: chinaglobalhub_laravel
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - chinaglobalhub
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=chinaglobalhub
      - DB_USERNAME=chinaglobalhub
      - DB_PASSWORD=secret
      - CACHE_DRIVER=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - SCOUT_DRIVER=meilisearch
      - MEILISEARCH_HOST=http://meilisearch:7700
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_BUCKET=chinaglobalhub
      - AWS_ENDPOINT=http://minio:9000
      - AWS_USE_PATH_STYLE_ENDPOINT=true
      - MAIL_MAILER=smtp
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
      - TZ=UTC
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    entrypoint: >
      sh -c "chmod -R 777 /app/storage /app/bootstrap/cache && php-fpm"


  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chinaglobalhub_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - POSTGRES_DB=chinaglobalhub
      - POSTGRES_USER=chinaglobalhub
      - POSTGRES_PASSWORD=secret
      - TZ=UTC
    networks:
      - chinaglobalhub
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chinaglobalhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: chinaglobalhub_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - chinaglobalhub
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Meilisearch
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: chinaglobalhub_meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    environment:
      - MEILI_ENV=production
      - MEILI_NO_ANALYTICS=true
      - TZ=UTC
    networks:
      - chinaglobalhub
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO S3 Storage
  minio:
    image: minio/minio:latest
    container_name: chinaglobalhub_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - TZ=UTC
    command: minio server /minio_data --console-address ":9001"
    networks:
      - chinaglobalhub
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mailpit for Email Testing
  mailpit:
    image: axllent/mailpit:latest
    container_name: chinaglobalhub_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      - TZ=UTC
    networks:
      - chinaglobalhub
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8025/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  meilisearch_data:
    driver: local
  minio_data:
    driver: local

networks:
  chinaglobalhub:
    driver: bridge
