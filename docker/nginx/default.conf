map $http_accept_language $lang {
    default "ru";
    ~en "en";
    ~zh "zh";
    ~ar "ar";
    ~fa "fa";
    ~tr "tr";
    ~pt "pt";
}

map $uri $is_rtl {
    ~^/(ar|fa)/ 1;
    default 0;
}

upstream laravel {
    server laravel:8000;
}

server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 100M;

    root /app/public;
    index index.php index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Vite build assets have content hashes — cache aggressively
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Other static assets
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Allow public storage (uploaded media files via symlink)
    location /storage/ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Deny access to bootstrap cache
    location ~ ^/bootstrap/ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Laravel routes
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP handler
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass laravel;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        
        # Standard CGI variables
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param REMOTE_PORT $remote_port;
        fastcgi_param SERVER_ADDR $server_addr;
        fastcgi_param SERVER_PORT $server_port;
        fastcgi_param SERVER_NAME $server_name;
        fastcgi_param SERVER_PROTOCOL $server_protocol;
        fastcgi_param REQUEST_TIME_FLOAT $msec;
        fastcgi_param REQUEST_TIME $request_time;

        # Headers
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param HTTP_USER_AGENT $http_user_agent;
        fastcgi_param HTTP_REFERER $http_referer;
        fastcgi_param HTTP_ACCEPT_LANGUAGE $http_accept_language;
        fastcgi_param HTTP_ACCEPT_ENCODING $http_accept_encoding;
        fastcgi_param HTTP_CONNECTION $http_connection;
        fastcgi_param HTTPS $https;
        fastcgi_param REQUEST_URI $request_uri;
        
        # RTL detection
        fastcgi_param HTTP_X_IS_RTL $is_rtl;

        # Timeouts
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 60s;
    }

    # Error pages
    error_page 404 /index.php;
    error_page 500 502 503 504 /50x.html;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
